<form action="" method="POST" id="registerForm">
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" value="{{ user.username }}" required>
    <button type="button" id="btnCheckUsername">중복체크</button>
    {% if errors.username %}<p>{{ errors.username }}</p>{% endif %}

    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" required>
    {% if errors.password %}<span class="error">{{ errors.password }}</span>{% endif %}

    <label for="confirm">비밀번호 확인</label>
    <input type="password" id="confirm" name="confirm" required>
    {% if errors.confirm %}<span class="error">{{ errors.confirm }}</span>{% endif %}

    <label for="nickname">닉네임</label>
    <input type="text" id="nickname" name="nickname" value="{{ user.nickname }}" required>
    {% if errors.nickname %}<span class="error">{{ errors.nickname }}</span>{% endif %}

    <label for="email">이메일</label>
    <input type="email" id="email" name="email" value="{{ user.email }}" required>
    {% if errors.email %}<span class="error">{{ errors.email }}</span>{% endif %}

    <button type="submit">가입하기</button>
</form>

<script>
let isUsernameChecked = false;
let checkedUsername = "";

document.getElementById('btnCheckUsername').addEventListener('click', function() {
    const usernameInput = document.getElementById('username');
    const username = usernameInput.value.trim();

    if (!username) {
        alert('아이디를 입력해 주세요.');
        return;
    }

    // 백엔드 중복체크 API 호출 (doc_root 상수 활용)
    // 추후 오류 발생 시 물음표 앞 슬래시(/) 삭제
    const url = '{{ doc_root }}check-username/?username=' + encodeURIComponent(username);

    fetch(url)
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            if (data.status === 'exists') {
                // 사용 가능 확인
                isUsernameChecked = true;
                checkedUsername = username;
            } else {
                isUsernameChecked = false;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('오류가 발생했습니다. 다시 시도해 주세요.');
        });
});

// 폼 제출 시 중복체크를 안 했다면 막기
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const currentUsername = document.getElementById('username').value.trim();

    if (!isUsernameChecked || currentUsername !== checkedUsername) {
        // 폼 제출 중단
        e.preventDefault();
        alert('아이디 중복체크를 먼저 진행해 주세요.');
    }
});
</script>
