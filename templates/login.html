{% extends 'layout.html' %}

{% block content %}
{# 토스트 팝업 #}
<div id="toast-container" class="toast-container"></div>
{% if status == 'reset_success' %}
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            showToast('비밀번호가 성공적으로 변경되었습니다.');
        });
    </script>
{% elseif status == 'access_denied' %}
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            showToast('접근 권한이 없습니다. 로그인 페이지로 이동합니다.');
        });
    </script>
{% endif %}

{# 로그인 에러 메시지 #}
{% if errors.login %}
<div class="alert alert-danger" role="alert">
    {{ errors.login }}
</div>
{% endif %}

<form action="" method="POST" id="loginForm">
    <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" value="{{ username }}" required>
    </div>

    <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required>
    </div>
    <button type="submit">로그인</button>

    <a href="{{ doc_root }}user-find-id" class="btn">아이디 찾기</a>
    <a href="{{ doc_root }}password-find" class="btn">비밀번호 찾기</a>
</form>
{% endblock %}

{% block scripts %}
<script>
// 토스트 팝업
function showToast(message) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerText = message;

    container.appendChild(toast);

    // 애니메이션이 끝나는 2.8초 뒤에 메모리에서 안전하게 제거
    setTimeout(() => {
        toast.remove();
    }, 2800);
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    const usernameInput = document.getElementById('username');
    const username = usernameInput.value.trim();
    const passwordInput = document.getElementById('password');
    const password = passwordInput.value.trim();

    // 아이디 필수 입력 값 검사
    if (!username) {
        e.preventDefault();
        alert('아이디를 입력해 주세요.');
        usernameInput.focus();
        return;
    }

    // 비밀번호 필수 입력 값 검사
    if (!password) {
        e.preventDefault();
        alert('비밀번호를 입력해 주세요.');
        passwordInput.focus();
        return;
    }
});
</script>
{% endblock %}
