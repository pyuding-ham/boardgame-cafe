{% extends 'layout.html' %}

{% block title %}페이지를 찾을 수 없습니다.{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-9 col-md-7 text-center py-5">
            <div class="text-secondary display-1 mb-4">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </div>
            
            <h1 class="fw-bold mb-3">페이지를 찾을 수 없습니다.</h1>
            
            <p class="text-muted mb-5">
                요청하신 주소가 올바르지 않거나, 변경 또는 삭제되어 현재 접근할 수 없습니다.<br>
                입력하신 주소를 다시 한번 확인해 주세요.
            </p>
            
            <div class="d-flex justify-content-center gap-2">
                <a href="{{ doc_root }}" class="btn btn-primary px-4">홈으로 이동</a>
                <button type="button" class="btn btn-outline-secondary px-4" onclick="history.back();">이전 페이지</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
